<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="THE SPLIT — the Hand of God diagnostic resolving across four dimensions">
  <defs>
    <style>
      .bg{fill:#161616}
      .layer{fill:#262626;stroke:#393939;stroke-width:1}
      .eyebrow{fill:#4589ff;font-size:13px;letter-spacing:2.4px;font-weight:600}
      .prompt{fill:#f4f4f4;font-size:30px;font-weight:300;letter-spacing:-0.5px}
      .axis{fill:#f4f4f4;font-size:15px;font-weight:600}
      .q{fill:#c6c6c6;font-size:11px}
      .state-out{fill:#c6c6c6;font-size:22px;font-weight:300}
      .state-hot{fill:#4589ff;font-size:22px;font-weight:300}
      .meaning{fill:#c6c6c6;font-size:11px}
      .trace{fill:#4589ff;font-size:9.5px;letter-spacing:1px;font-weight:600}
      .headline{fill:#f4f4f4;font-size:18px;font-weight:300}
      .credit{fill:#6f6f6f;font-size:11px;letter-spacing:1px}
    </style>
  </defs>

  <rect class="bg" width="1200" height="460"/>

  <!-- header -->
  <g transform="translate(40,44)">
    <text class="eyebrow">▸ THE SPLIT — DISAGREEMENT DIAGNOSTIC</text>
    <text class="prompt" y="34">Why this moment never resolved</text>
    <text class="credit" y="62">THE HAND OF GOD · ARGENTINA 2–1 ENGLAND · 1986</text>
  </g>

  <!-- Cells default to the RESOLVED state (opacity 1) so the static first frame — which is
       all GitHub's Camo proxy renders after stripping SMIL — already shows the full SPLIT.
       The fade-in is pure enhancement where animation is supported. -->

  <!-- RULE AMBIGUITY: ruled out -->
  <g transform="translate(40,140)" opacity="1">
    <animate attributeName="opacity" values="0;1" keyTimes="0;1" begin="0s" dur="0.5s" fill="freeze"/>
    <rect class="layer" width="270" height="150"/>
    <rect width="3" height="150" fill="#c6c6c6"/>
    <text class="axis" x="18" y="30">Rule ambiguity</text>
    <text class="q" x="18" y="50">Are the Laws themselves unclear?</text>
    <text class="state-out" x="18" y="104" text-decoration="line-through">Ruled out</text>
    <text class="meaning" x="18" y="126">A single clear offence clause</text>
  </g>

  <!-- INDETERMINACY: ruled out -->
  <g transform="translate(320,140)" opacity="1">
    <animate attributeName="opacity" values="0;1" begin="0.15s" dur="0.5s" fill="freeze"/>
    <rect class="layer" width="270" height="150"/>
    <rect width="3" height="150" fill="#c6c6c6"/>
    <text class="axis" x="18" y="30">Indeterminacy</text>
    <text class="q" x="18" y="50">Contested even with today's tech?</text>
    <text class="state-out" x="18" y="104" text-decoration="line-through">Ruled out</text>
    <text class="meaning" x="18" y="126">The act is admitted</text>
  </g>

  <!-- DECISION-TIME DEFICIT: present -->
  <g transform="translate(600,140)" opacity="1">
    <animate attributeName="opacity" values="0;1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <rect width="270" height="150" fill="#1b2b44" stroke="#4589ff" stroke-width="1"/>
    <rect width="3" height="150" fill="#4589ff"/>
    <text class="axis" x="18" y="30">Decision-time deficit</text>
    <text class="q" x="18" y="50">Knowable now, not in the moment?</text>
    <text class="state-hot" x="18" y="104">Present</text>
    <text class="meaning" x="18" y="126">What the referee could see</text>
    <text class="trace" x="18" y="142">TRACES TO SOURCE →</text>
  </g>

  <!-- CULTURAL PRIOR BIAS: present -->
  <g transform="translate(880,140)" opacity="1">
    <animate attributeName="opacity" values="0;1" begin="0.45s" dur="0.5s" fill="freeze"/>
    <rect width="280" height="150" fill="#1b2b44" stroke="#4589ff" stroke-width="1"/>
    <rect width="3" height="150" fill="#4589ff"/>
    <text class="axis" x="18" y="30">Cultural prior bias</text>
    <text class="q" x="18" y="50">Same facts, opposite outcome?</text>
    <text class="state-hot" x="18" y="104">Present</text>
    <text class="meaning" x="18" y="126">Which nation is watching</text>
    <text class="trace" x="18" y="142">TRACES TO SOURCE →</text>
  </g>

  <!-- headline -->
  <g transform="translate(40,344)" opacity="1">
    <animate attributeName="opacity" values="0;1" begin="0.9s" dur="0.7s" fill="freeze"/>
    <rect width="3" height="78" fill="#4589ff"/>
    <text class="headline" x="20" y="24">By the rules: settled. To half the world: never.</text>
    <text class="headline" x="20" y="50" fill="#c6c6c6">Not unclear law — what the referee could see,</text>
    <text class="headline" x="20" y="72" fill="#c6c6c6">and which nation is watching.</text>
  </g>
</svg>
