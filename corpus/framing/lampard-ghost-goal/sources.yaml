incident: lampard-ghost-goal
incident_title: "Lampard's ghost goal"
shared_fact: >-
  Frank Lampard's shot bounced down behind the goal line and was not given as a goal.
  Replays showed the ball had fully crossed the line. This much is settled and undisputed.

framings:
